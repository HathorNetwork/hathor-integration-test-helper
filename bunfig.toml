[install]
# Save dependencies with exact versions (no `^` or `~`). `bun add foo`
# would otherwise widen the range, which silently breaks any patches in
# `patchedDependencies` — the key there requires an exact match.
#
# wallet-lib's BigInt reviver is patched in patches/. A semver upgrade
# from 3.0.1 → 3.0.2 would mean the patch key (`@hathor/wallet-lib@3.0.1`)
# no longer matches the installed version, the patch silently stops
# applying, and JSONBigInt.parse starts re-throwing on Bun's wording.
# Exact saves prevent that path from ever opening.
exact = true

[test]
root = "./__tests__"

# Bun runs all test files in a single process, so mock.module() calls
# leak across files. Use `bun run test` (package.json) to run each
# file in isolation. Integration tests require a live Docker stack.
#
# bun run test            — unit tests (isolated per-file)
# bun run test:integration — e2e tests against Docker stack
