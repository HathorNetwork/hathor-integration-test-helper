name: docker

# Publishes the Docker image to DockerHub when a maintainer deliberately
# pushes a `v*` version tag. The only gate is that the tagged commit must be
# an ancestor of `main`: branch protection guarantees nothing reaches `main`
# without passing CI and review, so "on main" already proves "CI is green".
# We therefore do NOT re-run CI here.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

env:
  IMAGE: docker.io/hathornetwork/hathor-integration-test-helper

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        # fetch-depth: 0 so the ancestry check below has full history.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Verify tag points to a commit on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not point to a commit on main. Refusing to publish."
            exit 1
          fi

      - name: Prepare tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Reject anything that isn't a clean stable vMAJOR.MINOR.PATCH tag,
          # so a stray tag can't yield an invalid image tag or smuggle extra
          # comma-separated tags into the publish list. Pre-releases are
          # disallowed since `latest` is always applied and must only ever
          # track a stable release.
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not a valid vMAJOR.MINOR.PATCH version. Refusing to publish."
            exit 1
          fi
          echo "tags=${IMAGE}:${version},${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        # https://github.com/docker/setup-qemu-action/releases/tag/v3.2.0
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf

      - name: Set up Docker Buildx
        # https://github.com/docker/setup-buildx-action/releases/tag/v3.6.1
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db

      - name: Login to DockerHub
        # https://github.com/docker/login-action/releases/tag/v3.3.0
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        # https://github.com/docker/build-push-action/releases/tag/v6.15.0
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4
        with:
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
